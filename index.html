<section style="max-width:600px;margin:auto;padding:20px;">
    <h2>Erstelle dein Abenteuer</h2>

    <label>Name des Kindes:</label><br>
    <input type="text" id="name" style="width:100%;padding:10px;"><br><br>

    <label>Alter:</label><br>
    <input type="number" id="alter" style="width:100%;padding:10px;"><br><br>

    <label>Interessen:</label><br>
    <input type="text" id="interessen" placeholder="Dinosaurier, Einhörner, Fußball..." style="width:100%;padding:10px;"><br><br>

    <button onclick="geschichteErstellen()" style="padding:12px 20px;background:#ff7f50;color:white;border:none;border-radius:5px;">
        Geschichte erstellen
    </button>

    <div id="ergebnis" style="margin-top:20px;"></div>
</section>

<script>
function geschichteErstellen() {
    let name = document.getElementById("name").value;
    let alter = document.getElementById("alter").value;
    let interessen = document.getElementById("interessen").value;

    document.getElementById("ergebnis").innerHTML =
    "<h3>Abenteuer von " + name + "</h3>" +
    "<p>" + name + " ist " + alter +
    " Jahre alt und liebt " + interessen +
    ". Eines Tages begann ein magisches Abenteuer...</p>";
}
</script>
